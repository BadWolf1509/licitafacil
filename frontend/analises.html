<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LicitaFácil - Análises</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/analises.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="dashboard.html" class="header-logo">LicitaFácil</a>

        <!-- Botão hamburger (mobile) -->
        <button class="nav-toggle" aria-label="Abrir menu" aria-expanded="false">
            <span class="hamburger"></span>
        </button>

        <nav class="header-nav" id="headerNav">
            <a href="dashboard.html">Dashboard</a>
            <div class="nav-dropdown" data-dropdown>
                <button class="nav-dropdown-toggle" aria-haspopup="true" aria-expanded="false">Licitações <svg class="nav-dropdown-arrow" width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5l3 3 3-3"/></svg></button>
                <div class="nav-dropdown-menu" role="menu">
                    <a href="licitacoes.html">Gestão</a>
                    <a href="encontrar.html">Encontrar Licitações</a>
                    <a href="calendario.html">Calendário</a>
                </div>
            </div>
            <div class="nav-dropdown" data-dropdown>
                <button class="nav-dropdown-toggle active" aria-haspopup="true" aria-expanded="false">Documentos <svg class="nav-dropdown-arrow" width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5l3 3 3-3"/></svg></button>
                <div class="nav-dropdown-menu" role="menu">
                    <a href="atestados.html">Atestados</a>
                    <a href="analises.html" class="active">Análises</a>
                    <a href="documentos.html">Documentos</a>
                </div>
            </div>
            <div class="nav-utility">
                <a href="admin.html" id="adminLink" class="hidden">Admin</a>
                <a href="perfil.html">Perfil</a>
                <a href="#" class="nav-logout">Sair</a>
            </div>
        </nav>
    </header>

    <div class="container">
        <div id="alertContainer"></div>

        <div class="d-flex justify-between align-center mb-3">
            <h1>Análises de Licitações</h1>
            <button class="btn btn-primary" id="btnNovaAnalise">+ Nova Análise</button>
        </div>

        <!-- Lista de análises -->
        <div id="listaAnalises">
            <div class="card empty-state">
                <div class="empty-state-icon">🔍</div>
                <h3>Carregando análises...</h3>
            </div>
        </div>

        <!-- Detalhe da análise (exibido quando selecionado) -->
        <div id="detalheAnalise" class="hidden">
            <div class="card">
                <div class="d-flex justify-between align-center mb-3">
                    <h2 id="analiseNome">Análise</h2>
                    <button class="btn btn-outline btn-sm" id="btnVoltarLista">← Voltar</button>
                </div>
                <div id="resultadoAnalise"></div>
            </div>
        </div>
    </div>

    <!-- Modal Nova Análise -->
    <div class="modal" id="modalNovaAnalise">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h2>Nova Análise de Licitação</h2>
                <button class="modal-close">&times;</button>
            </div>

            <!-- Tabs do Modal -->
            <div class="modal-tabs" id="modalAnaliseTabs">
                <button class="modal-tab active" data-tab="upload">
                    📄 Upload de PDF
                </button>
                <button class="modal-tab" data-tab="manual">
                    ✏️ Cadastro Manual
                </button>
            </div>

            <!-- Conteúdo: Upload de PDF -->
            <div class="modal-tab-content active" id="tabAnaliseUpload">
                <form id="formNovaAnalise">
                    <div class="form-group">
                        <label class="form-label">Nome/Número da Licitação *</label>
                        <input type="text" class="form-input" id="nomeLicitacao" required
                            placeholder="Ex: Pregão 001/2026 - Pavimentação">
                    </div>
                    <div class="form-group">
                        <label class="form-label">PDF do Edital (página de quantitativos) *</label>
                        <div class="upload-zone" id="uploadZoneAnalise">
                            <p>📄 Clique ou arraste o PDF aqui</p>
                            <input type="file" id="fileInputAnalise" accept=".pdf">
                        </div>
                        <p id="nomeArquivo" class="text-muted mt-1"></p>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary" style="flex: 1;">
                            <span id="btnAnaliseText">Analisar</span>
                            <span id="btnAnaliseSpinner" class="spinner hidden"></span>
                        </button>
                        <button type="button" class="btn btn-outline" data-dismiss="modal">Cancelar</button>
                    </div>
                </form>
            </div>

            <!-- Conteúdo: Cadastro Manual -->
            <div class="modal-tab-content" id="tabAnaliseManual">
                <form id="formAnaliseManual">
                    <div class="form-group">
                        <label class="form-label">Nome/Número da Licitação *</label>
                        <input type="text" class="form-input" id="nomeLicitacaoManual" required
                            placeholder="Ex: Pregão 001/2026 - Pavimentação">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Exigências do Edital *</label>
                        <p class="text-muted" style="font-size: 0.875rem; margin-bottom: 0.5rem;">
                            Adicione as exigências de capacidade técnica que deseja verificar.
                        </p>
                        <div id="listaExigencias">
                            <!-- Exigências serão adicionadas aqui -->
                        </div>
                        <button type="button" class="btn btn-outline btn-sm mt-2" id="btnAdicionarExigencia">
                            + Adicionar Exigência
                        </button>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary" style="flex: 1;">
                            <span id="btnAnaliseManualText">Analisar</span>
                            <span id="btnAnaliseManualSpinner" class="spinner hidden"></span>
                        </button>
                        <button type="button" class="btn btn-outline" data-dismiss="modal">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Supabase JS (local para evitar bloqueio de tracking prevention) -->
    <script src="js/lib/supabase.min.js"></script>
    <script src="js/sanitize.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/error-handler.js"></script>
    <script src="js/notificacoes.js"></script>
    <script src="js/analises.js"></script>
</body>
</html>
